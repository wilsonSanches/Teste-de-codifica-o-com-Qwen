<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Atividades</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Gerenciador de Atividades</h1>
        </header>

        <section id="register-section">
            <h2>Registrar Nova Atividade</h2>
            <form id="activity-form">
                <div class="form-group">
                    <label for="date">Data:</label>
                    <input type="date" id="date" name="date" required>
                </div>
                
                <div class="form-group">
                    <label for="activity">Atividade:</label>
                    <input type="text" id="activity" name="activity" placeholder="Nome da atividade" required>
                </div>
                
                <div class="form-group">
                    <label for="description">Descrição:</label>
                    <textarea id="description" name="description" placeholder="Descrição detalhada da atividade" required></textarea>
                </div>
                
                <div class="form-group">
                    <label for="duration">Duração (horas):</label>
                    <input type="number" id="duration" name="duration" min="0" step="0.5" placeholder="0.0">
                </div>
                
                <div class="form-group">
                    <label for="category">Categoria:</label>
                    <select id="category" name="category">
                        <option value="desenvolvimento">Desenvolvimento</option>
                        <option value="reuniao">Reunião</option>
                        <option value="treinamento">Treinamento</option>
                        <option value="planejamento">Planejamento</option>
                        <option value="manutencao">Manutenção</option>
                        <option value="pesquisa">Pesquisa</option>
                        <option value="outros">Outros</option>
                    </select>
                </div>
                
                <button type="submit">Registrar Atividade</button>
            </form>
        </section>

        <section id="report-section">
            <h2>Gerar Relatórios</h2>
            
            <div class="report-options">
                <button id="weekly-report-btn">Relatório Semanal</button>
                <button id="monthly-report-btn">Relatório Mensal</button>
                <button id="annual-report-btn">Relatório Anual</button>
            </div>
            
            <div class="report-params" id="weekly-params" style="display:none;">
                <h3>Parâmetros do Relatório Semanal</h3>
                <div class="form-group">
                    <label for="weekly-start-date">Data de início (segunda-feira):</label>
                    <input type="date" id="weekly-start-date">
                </div>
            </div>
            
            <div class="report-params" id="monthly-params" style="display:none;">
                <h3>Parâmetros do Relatório Mensal</h3>
                <div class="form-group">
                    <label for="monthly-year">Ano:</label>
                    <input type="number" id="monthly-year" min="2000" max="2100" value="">
                </div>
                <div class="form-group">
                    <label for="monthly-month">Mês:</label>
                    <select id="monthly-month">
                        <option value="1">Janeiro</option>
                        <option value="2">Fevereiro</option>
                        <option value="3">Março</option>
                        <option value="4">Abril</option>
                        <option value="5">Maio</option>
                        <option value="6">Junho</option>
                        <option value="7">Julho</option>
                        <option value="8">Agosto</option>
                        <option value="9">Setembro</option>
                        <option value="10">Outubro</option>
                        <option value="11">Novembro</option>
                        <option value="12">Dezembro</option>
                    </select>
                </div>
            </div>
            
            <div class="report-params" id="annual-params" style="display:none;">
                <h3>Parâmetros do Relatório Anual</h3>
                <div class="form-group">
                    <label for="annual-year">Ano:</label>
                    <input type="number" id="annual-year" min="2000" max="2100" value="">
                </div>
            </div>
            
            <button id="generate-report-btn" style="display:none;">Gerar Relatório</button>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
